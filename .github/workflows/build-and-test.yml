  cpp_benchmark:
    name: C++ Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run before script
        timeout-minutes: 10
        run: |
          mkdir -p cpp/build
          cd cpp/build
          cmake -DBUILD_PLO5=ON -DBUILD_PLO6=OFF .. ; make
      - name: Run script
        run: |
          cd cpp/build
          ./benchmark_phevaluator

  python-test:
    name: Python - Run unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build the extension in place
        run: |
          cd python
          pip install -e .
      - name: Run tests
        run: |
          cd python
          python -m unittest discover -v

  python-check-install:
    name: Python - Check package installation (without releasing)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          cd python
          pip install .

  python-test-plo:
    name: Python - Run PLO5 unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build with PLO5 support
        # The PLO lookup tables are large, so compiling them is slow and
        # memory-hungry. They are opt-in via PHEVALUATOR_BUILD_PLO.
        #
        # Only PLO5 is exercised here: compiling the PLO6 table needs well over
        # 12 GB of RAM, which risks OOM-killing the compiler on the 16 GB
        # GitHub-hosted runners (gcc uses even more than clang). PLO6 is left to
        # local/manual builds. The PLO6 tests are skipped when it is not built.
        timeout-minutes: 30
        run: |
          cd python
          PHEVALUATOR_BUILD_PLO=5 pip install -e .
      - name: Run tests
        run: |
          cd python
          python -m unittest discover -v

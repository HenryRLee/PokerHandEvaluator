name: Docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "Documentation/Algorithm.md"
      - "python/phevaluator/**"
      - "python/pyproject.toml"
      - "cpp/README.md"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [develop, master]
    paths:
      - "docs/**"
      - "Documentation/Algorithm.md"
      - "python/phevaluator/**"
      - "python/pyproject.toml"
      - "cpp/README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do not cancel in-progress runs so deploys
# always finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install documentation dependencies
        run: pip install './python[docs]'
      - name: Build the HTML documentation
        run: sphinx-build -b html -W --keep-going docs docs/_build/html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    # Only publish when the master branch changes; PRs (and other branches)
    # just build to catch errors.
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
